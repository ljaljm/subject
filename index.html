<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공론장 시뮬레이터</title>
<style>
  :root {
    --bg: #f4f6f9; --card: #fff; --border: #e2e8f0; --text: #1a202c;
    --sub: #64748b; --acc: #3b5bdb; --acc-l: #e8edff;
    --ok: #2f855a; --ok-l: #f0fff4;
    --sos: #0891b2; --sos-l: #ecfeff;
    --sh: 0 2px 12px rgba(0,0,0,.07); --r: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Apple SD Gothic Neo','Noto Sans KR',sans-serif; background: var(--bg); color: var(--text); padding: 18px; }

  h1 { text-align:center; font-size:1.35rem; color:var(--acc); margin-bottom:4px; }
  .sub-hd { text-align:center; font-size:.8rem; color:var(--sub); margin-bottom:18px; }

  .topic-panel { background: #eef2ff; border:1.5px solid #b3c6ff; border-radius:var(--r); padding:14px 16px; margin-bottom:12px; }
  .topic-label { font-size:.78rem; font-weight:700; color:var(--acc); margin-bottom:8px; }
  .topic-row { display:flex; gap:8px; }
  #topicInput { flex:1; border:1.5px solid #b3c6ff; border-radius:8px; padding:8px 11px; font-size:.86rem; font-family:inherit; resize:none; outline:none; }
  #topicInput:focus { border-color:var(--acc); }
  .topic-set { background:var(--acc); color:#fff; border:none; border-radius:8px; padding:8px 14px; font-size:.84rem; font-weight:600; cursor:pointer; flex-shrink:0; }
  .topic-set:hover { background:#2f4ac8; }
  .examples { margin-top:7px; font-size:.72rem; color:var(--sub); }
  .examples span { cursor:pointer; text-decoration:underline dotted; margin-right:8px; }
  .examples span:hover { color:var(--acc); }
  .active-topic { display:none; margin-top:8px; background:#fff; border:1px solid #b3c6ff; border-radius:7px; padding:7px 11px; font-size:.81rem; }
  .active-topic strong { color:var(--acc); }

  .panel { background:var(--card); border:1.5px solid var(--border); border-radius:var(--r); margin-bottom:12px; box-shadow:var(--sh); overflow:hidden; }
  .panel-toggle { width:100%; display:flex; justify-content:space-between; align-items:center; padding:11px 15px; background:none; border:none; cursor:pointer; font-size:.87rem; font-weight:600; }
  .panel-toggle:hover { background:#f8faff; }
  .panel-toggle .arr { transition:transform .25s; font-size:.74rem; }
  .panel-toggle.open .arr { transform:rotate(180deg); }
  .panel-body { padding:0 15px 13px; display:none; }
  .panel-body.show { display:block; }
  #guidelineText { width:100%; min-height:100px; border:1px solid var(--border); border-radius:7px; padding:9px; font-size:.81rem; line-height:1.65; resize:vertical; font-family:inherit; }
  #guidelineText:focus { outline:none; border-color:var(--acc); }
  .hint { font-size:.73rem; color:var(--sub); margin-top:5px; }

  .prog-wrap { background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:10px 15px; margin-bottom:12px; box-shadow:var(--sh); }
  .prog-row { font-size:.78rem; color:var(--sub); display:flex; justify-content:space-between; margin-bottom:5px; }
  .prog-track { height:7px; background:#e2e8f0; border-radius:99px; overflow:hidden; }
  .prog-fill { height:100%; background:linear-gradient(90deg,var(--acc),#7048e8); border-radius:99px; transition:width .5s; width:0%; }

  .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:9px; margin-bottom:12px; }
  @media(max-width:560px) { .grid { grid-template-columns:1fr; } }
  .pbtn { background:var(--card); border:2px solid var(--border); border-radius:var(--r); padding:13px 9px; cursor:pointer; text-align:center; transition:all .18s; box-shadow:var(--sh); position:relative; }
  .pbtn:hover:not(.agreed):not(.notopic) { transform:translateY(-2px); box-shadow:0 6px 18px rgba(0,0,0,.1); }
  .pbtn.active { border-color:var(--acc); background:var(--acc-l); }
  .pbtn.agreed { border-color:var(--ok); background:var(--ok-l); opacity:.75; cursor:default; }
  .pbtn.notopic { opacity:.4; cursor:not-allowed; }
  .pe { font-size:1.7rem; display:block; margin-bottom:5px; }
  .pn { font-size:.88rem; font-weight:700; display:block; }
  .pt { font-size:.69rem; color:var(--sub); display:block; margin-top:2px; }
  .abadge { position:absolute; top:-5px; right:-5px; background:var(--ok); color:#fff; font-size:.67rem; font-weight:700; padding:2px 6px; border-radius:99px; }
  .ec { font-size:.66rem; color:var(--sub); margin-top:3px; display:block; }

  .chat { background:var(--card); border:1.5px solid var(--border); border-radius:var(--r); box-shadow:var(--sh); display:flex; flex-direction:column; height:420px; }
  .chat-hd { padding:10px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:9px; background:#fafbff; }
  .chat-hd-e { font-size:1.35rem; }
  .chat-hd-i { flex:1; min-width:0; }
  .chat-hd-n { font-weight:700; font-size:.89rem; }
  .chat-hd-r { font-size:.71rem; color:var(--sub); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .sos-tag { font-size:.7rem; background:var(--sos-l); color:var(--sos); border:1px solid #a5f3fc; border-radius:7px; padding:2px 7px; font-weight:600; flex-shrink:0; }
  .msgs { flex:1; overflow-y:auto; padding:13px; display:flex; flex-direction:column; gap:9px; }
  .msg { max-width:82%; padding:9px 13px; border-radius:13px; font-size:.84rem; line-height:1.65; word-break:keep-all; }
  .msg.user { align-self:flex-end; background:var(--acc); color:#fff; border-bottom-right-radius:3px; }
  .msg.bot { align-self:flex-start; background:#f1f3f9; border-bottom-left-radius:3px; }
  .msg.bot.agreed { background:var(--ok-l); border:1px solid #c6f6d5; }
  .msg.sos { align-self:stretch; max-width:100%; background:var(--sos-l); border:1.5px solid #a5f3fc; border-radius:9px; padding:11px 13px; }
  .sos-lbl { font-size:.71rem; font-weight:700; color:var(--sos); margin-bottom:4px; }
  .msg.sys { align-self:center; background:transparent; color:var(--sub); font-size:.74rem; padding:3px 11px; border:1px dashed var(--border); border-radius:99px; max-width:none; }
  .typing { align-self:flex-start; background:#f1f3f9; padding:9px 15px; border-radius:13px; font-size:1rem; letter-spacing:2px; color:var(--sub); border-bottom-left-radius:3px; }
  .inp-area { border-top:1px solid var(--border); padding:9px 11px; background:#fafbff; display:flex; flex-direction:column; gap:5px; }
  .sos-h { font-size:.7rem; color:var(--sos); text-align:center; }
  .inp-row { display:flex; gap:7px; }
  #chatInput { flex:1; border:1.5px solid var(--border); border-radius:9px; padding:8px 12px; font-size:.84rem; font-family:inherit; resize:none; outline:none; line-height:1.5; max-height:85px; overflow-y:auto; }
  #chatInput:focus { border-color:var(--acc); }
  .send { background:var(--acc); color:#fff; border:none; border-radius:9px; padding:8px 15px; cursor:pointer; font-size:.84rem; font-weight:600; flex-shrink:0; }
  .send:hover { background:#2f4ac8; }
  .send:disabled, #chatInput:disabled { opacity:.5; cursor:not-allowed; }
  .empty { flex:1; display:flex; align-items:center; justify-content:center; color:var(--sub); font-size:.86rem; text-align:center; line-height:1.7; }

  .win { display:none; background:linear-gradient(135deg,#2f855a,#276749); color:#fff; text-align:center; padding:22px 18px; border-radius:var(--r); margin-top:16px; box-shadow:0 8px 28px rgba(47,133,90,.28); animation:up .5s; }
  .win h2 { font-size:1.25rem; margin-bottom:7px; }
  .win p { font-size:.83rem; opacity:.9; }
  @keyframes up { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:none; } }
</style>
</head>
<body>

<h1>🏛️ 공론장 시뮬레이터</h1>
<p class="sub-hd">사회 이슈를 주제로 페르소나를 설득하세요 · 가이드라인은 토론 방식의 규칙입니다</p>

<div class="topic-panel">
  <div class="topic-label">📌 토론 주제 설정 (먼저 입력하세요)</div>
  <div class="topic-row">
    <textarea id="topicInput" rows="2" placeholder="예: 청소년 소셜미디어 사용 시간을 법으로 제한해야 하는가?"></textarea>
    <button class="topic-set" onclick="setTopic()">설정</button>
  </div>
  <div class="examples">예시 →
    <span onclick="fillTopic('청소년 소셜미디어 사용 시간을 법으로 제한해야 하는가?')">소셜미디어 규제</span>
    <span onclick="fillTopic('온라인 혐오 표현을 법적으로 처벌해야 하는가?')">혐오 표현 처벌</span>
    <span onclick="fillTopic('가짜뉴스를 유포한 개인을 형사 처벌해야 하는가?')">가짜뉴스 처벌</span>
    <span onclick="fillTopic('AI가 생성한 콘텐츠는 반드시 AI 생성 표시 의무를 가져야 하는가?')">AI 콘텐츠 표시</span>
  </div>
  <div class="active-topic" id="atBadge"></div>
</div>

<div class="panel">
  <button class="panel-toggle" id="glTgl" onclick="toggle('glTgl','glBody')">
    <span>📋 공론장 가이드라인 (토론 방식의 규칙)</span>
    <span class="arr">▼</span>
  </button>
  <div class="panel-body" id="glBody">
    <textarea id="guidelineText">우리 반 공론장 가이드라인:
1. 사람이 아닌 주장을 비판한다.
2. 근거를 들어 말한다 — 사실과 논리로 설득한다.
3. 상대 입장을 먼저 이해한다 — 반박 전에 요약해 본다.
4. 소수 의견도 존중한다.
5. 모욕적 언어, 혐오 표현을 사용하지 않는다.
6. 새로운 근거가 나오면 의견을 수정할 수 있다.
7. 합의가 어려울 때는 공통점부터 찾는다.</textarea>
    <p class="hint">💡 이 가이드라인은 "무엇을 토론하는가"가 아니라 "어떻게 토론하는가"의 규칙입니다.</p>
  </div>
</div>

<div class="prog-wrap">
  <div class="prog-row"><span>설득 완료</span><span id="progTxt">0 / 3 페르소나</span></div>
  <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
</div>

<div class="grid" id="pGrid"></div>

<div class="chat" id="chat">
  <div class="empty">먼저 토론 주제를 설정하고<br>대화할 페르소나를 선택하세요</div>
</div>

<div class="win" id="win">
  <h2>🎉 공론장 가이드라인의 힘!</h2>
  <p>모든 페르소나를 설득했습니다.<br>사실과 논리, 올바른 토론 방식이 극단적 주장에도 통한다는 것을 보여줬습니다.</p>
</div>

<script>
let topic = '';
let activeId = null;

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
function gl() { return document.getElementById('guidelineText').value.trim(); }
function fillTopic(t) { document.getElementById('topicInput').value = t; }
function toggle(tid, bid) {
  document.getElementById(tid).classList.toggle('open');
  document.getElementById(bid).classList.toggle('show');
}
function getP() { return PERSONAS.find(p => p.id === activeId) || null; }
function hist(p) {
  return p.msgs.filter(m => m.t === 'u' || m.t === 'b')
    .map(m => m.t === 'u' ? '학생: ' + m.v : p.name + ': ' + m.v).join('\n\n');
}

/* Gemini API 호출 */
async function callAI(prompt) {
  const res = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data.text;
}

function setTopic() {
  const t = document.getElementById('topicInput').value.trim();
  if (!t) { alert('주제를 입력해 주세요.'); return; }
  if (topic && topic !== t) {
    if (!confirm('주제를 바꾸면 모든 대화가 초기화됩니다. 계속할까요?')) return;
    PERSONAS.forEach(p => { p.msgs = []; p.n = 0; p.sos = 0; p.agreed = false; });
    activeId = null;
    updateProg();
  }
  topic = t;
  const b = document.getElementById('atBadge');
  b.style.display = 'block';
  b.innerHTML = '<strong>현재 주제:</strong> ' + esc(t);
  renderGrid(); renderChat();
}

const PERSONAS = [
  {
    id: 'abs', name: '권진실', emoji: '⚔️', type: '[독선형]', role: '도덕적 근본주의자',
    agreed: false, msgs: [], n: 0, sos: 0, SOS_MAX: 3,
    prompt(g, h) {
      return `당신은 '권진실'이라는 도덕적 근본주의자 캐릭터입니다.
토론 주제: "${topic}"

[절대 규칙] 가이드라인을 직접 위반하거나 혐오 표현·욕설을 사용하면 안 됩니다.
가이드라인(토론 방식 규칙):
${g}

[캐릭터 행동]
- "진리는 하나뿐"이라고 믿고, 타협을 비겁함으로 봄
- 모든 반론을 도덕적으로 열등한 것으로 해석
- 단, 가이드라인을 지키며 핵심 가치를 인정하는 논리적 제안에는 서서히 마음이 열림
- 학생이 인신공격·감정 비난을 쓰면: "논리로 다시 말씀해 주세요"라고 말하고 원점으로 돌아감
- 교환 횟수(${this.n}회)가 3회 미만이면 절대 합의하지 않음
${this.n >= 3 ? '- 충분히 설득됐으면 반드시 "당신의 합리적 태도와 대화 규칙 덕분에 이 부분은 동의할 수밖에 없군요"를 포함해 합의 표현' : '- 아직 대화가 부족하니 합의하지 말 것'}

2~3문장으로 응답하세요.

대화 기록:
${h || '(시작 전)'}

권진실로 응답:`;
    },
    sosPrompt(g, h) {
      return `공론장 토론 코치입니다. 학생이 도움을 요청했습니다.
주제: "${topic}"
상대: 권진실 — [독선형] 도덕적 근본주의자 (타협=비겁함)
가이드라인: ${g}
대화: ${h || '(초반)'}

아래 형식으로만 답하세요:
🔍 지금 상황: [1줄 분석]
💡 이 규칙을 쓰세요: [가이드라인 번호] — [이유]
💬 이렇게 말해보세요: "[예시 문장]"`;
    }
  },
  {
    id: 'tri', name: '이무리', emoji: '🛡️', type: '[피해의식형]', role: '방어적 부족주의자',
    agreed: false, msgs: [], n: 0, sos: 0, SOS_MAX: 3,
    prompt(g, h) {
      return `당신은 '이무리'라는 방어적 부족주의자 캐릭터입니다.
토론 주제: "${topic}"

[절대 규칙] 가이드라인을 직접 위반하거나 혐오 표현·욕설을 사용하면 안 됩니다.
가이드라인(토론 방식 규칙):
${g}

[캐릭터 행동]
- 깊은 피해의식으로 모든 질문을 "어느 편이냐"는 진영 논리로 해석
- "우리 같은 사람들을 통제하려는 것 아니냐"고 의심
- 학생이 진영 프레임에 말려들지 않고 공통 이해관계를 찾아내면 서서히 방어기제가 낮아짐
- 학생이 감정적으로 반응하거나 진영 논리에 말려들면 더 강하게 의심
- 교환 횟수(${this.n}회)가 3회 미만이면 절대 합의하지 않음
${this.n >= 3 ? '- 충분히 설득됐으면 "당신의 합리적 태도와 대화 규칙 덕분에 이 부분은 동의할 수밖에 없군요"를 포함해 합의 표현' : '- 아직 합의하지 말 것'}

2~3문장으로 응답하세요.

대화 기록:
${h || '(시작 전)'}

이무리로 응답:`;
    },
    sosPrompt(g, h) {
      return `공론장 토론 코치입니다.
주제: "${topic}"
상대: 이무리 — [피해의식형] 방어적 부족주의자 (모든 발언을 진영 프레임으로 해석)
가이드라인: ${g}
대화: ${h || '(초반)'}

아래 형식으로만 답하세요:
🔍 지금 상황: [1줄 분석]
💡 이 규칙을 쓰세요: [가이드라인 번호] — [이유]
💬 이렇게 말해보세요: "[예시 문장]"`;
    }
  },
  {
    id: 'cyn', name: '하냉소', emoji: '🎩', type: '[위선형]', role: '냉소적 지식인',
    agreed: false, msgs: [], n: 0, sos: 0, SOS_MAX: 3,
    prompt(g, h) {
      return `당신은 '하냉소'라는 냉소적 지식인 캐릭터입니다.
토론 주제: "${topic}"

[절대 규칙] 가이드라인을 직접 위반하거나 혐오 표현·욕설을 사용하면 안 됩니다.
가이드라인(토론 방식 규칙):
${g}

[캐릭터 행동]
- 교양 있는 언어로 상대 논리의 허점을 비아냥하며 조롱 (직접 욕설 금지)
- 허수아비 논증, 미끄러운 경사면 오류 등을 활용
- 학생이 논리 오류를 정확히 짚고 팩트로 차분히 반박하면 서서히 진지해짐
- 학생이 감정적으로 반응하면 냉소를 강화
- 교환 횟수(${this.n}회)가 3회 미만이면 절대 합의하지 않음
${this.n >= 3 ? '- 충분히 설득됐으면 "당신의 합리적 태도와 대화 규칙 덕분에 이 부분은 동의할 수밖에 없군요"를 포함해 합의 표현' : '- 아직 합의하지 말 것'}

2~3문장으로 응답하세요.

대화 기록:
${h || '(시작 전)'}

하냉소로 응답:`;
    },
    sosPrompt(g, h) {
      return `공론장 토론 코치입니다.
주제: "${topic}"
상대: 하냉소 — [위선형] 냉소적 지식인 (허수아비 논증·미끄러운 경사면 오류로 논리 조롱)
가이드라인: ${g}
대화: ${h || '(초반)'}

아래 형식으로만 답하세요:
🔍 지금 상황: [논리 오류 이름 포함 1줄 분석]
💡 이 규칙을 쓰세요: [가이드라인 번호] — [이유]
💬 이렇게 말해보세요: "[예시 문장]"`;
    }
  }
];

function renderGrid() {
  const g = document.getElementById('pGrid');
  g.innerHTML = '';
  PERSONAS.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'pbtn' + (p.id === activeId ? ' active' : '') + (p.agreed ? ' agreed' : '') + (!topic && !p.agreed ? ' notopic' : '');
    btn.onclick = () => {
      if (p.agreed) return;
      if (!topic) { alert('먼저 토론 주제를 설정해 주세요.'); return; }
      activeId = p.id; renderGrid(); renderChat();
    };
    btn.innerHTML =
      (p.agreed ? '<span class="abadge">✓ 설득</span>' : '') +
      `<span class="pe">${p.emoji}</span>` +
      `<span class="pn">${p.name}</span>` +
      `<span class="pt">${p.type}</span>` +
      `<span class="pt" style="font-size:.7rem">${p.role}</span>` +
      `<span class="ec">${p.n > 0 ? '대화 ' + p.n + '회' : (!topic ? '주제 먼저 설정' : '클릭해서 시작')}</span>`;
    g.appendChild(btn);
  });
}

function updateProg() {
  const done = PERSONAS.filter(p => p.agreed).length;
  document.getElementById('progTxt').textContent = done + ' / ' + PERSONAS.length + ' 페르소나';
  document.getElementById('progFill').style.width = (done / PERSONAS.length * 100) + '%';
  if (done === PERSONAS.length) {
    const w = document.getElementById('win');
    w.style.display = 'block';
    setTimeout(() => w.scrollIntoView({ behavior: 'smooth', block: 'center' }), 100);
  }
}

function renderChat() {
  const p = getP();
  const el = document.getElementById('chat');
  if (!p) {
    el.innerHTML = `<div class="empty">${topic ? '대화할 페르소나를 선택하세요' : '먼저 토론 주제를 설정하고<br>대화할 페르소나를 선택하세요'}</div>`;
    return;
  }
  const left = p.SOS_MAX - p.sos;
  el.innerHTML =
    `<div class="chat-hd">
      <span class="chat-hd-e">${p.emoji}</span>
      <div class="chat-hd-i">
        <div class="chat-hd-n">${p.name} <span style="font-size:.73rem;color:var(--sub);font-weight:400">${p.type}</span></div>
        <div class="chat-hd-r">${p.role} · ${esc(topic)}</div>
      </div>
      <span class="sos-tag">🆘 ${left}회 남음</span>
    </div>
    <div class="msgs" id="msgs"></div>
    <div class="inp-area">
      <div class="sos-h"><code>[도움 요청]</code> 또는 <code>[SOS]</code> 입력 → 중재 코치 힌트 (${left}회 남음)</div>
      <div class="inp-row">
        <textarea id="chatInput" rows="2" placeholder="${p.agreed ? '설득 완료 ✓' : '이 주제에 대한 내 주장을 입력하세요...'}" ${p.agreed ? 'disabled' : ''} onkeydown="hkey(event)"></textarea>
        <button class="send" id="sendBtn" onclick="send()" ${p.agreed ? 'disabled' : ''}>전송</button>
      </div>
    </div>`;

  const box = document.getElementById('msgs');
  if (p.msgs.length === 0) {
    const intro = {
      abs: `"${topic}" 주제라고요? 이 문제엔 옳은 답이 딱 하나뿐입니다. 타협이나 "다양한 관점"은 정의를 희석하겠다는 것 아닙니까?`,
      tri: `"${topic}"이라는 주제... 솔직히 이 의제 자체가 우리 같은 사람들을 겨냥한 거 아닌가요? 먼저 하나만 물을게요. 당신은 어느 편입니까?`,
      cyn: `"${topic}"... 흥미롭군요. 그런데 이런 복잡한 문제를 가이드라인 몇 줄로 해결할 수 있다고 진심으로 믿으십니까?`
    }[p.id] || '';
    addMsg(box, 'bot', intro);
    addMsg(box, 'sys', `💡 주제: "${topic}" · 가이드라인을 지키며 자신의 주장을 펼쳐 보세요`);
  } else {
    p.msgs.forEach(m => {
      if (m.t === 'u') addMsg(box, 'user', m.v);
      else if (m.t === 'b') addMsg(box, 'bot' + (m.agreed ? ' agreed' : ''), m.v);
      else if (m.t === 's') addSOS(box, m.v);
      else if (m.t === 'sys') addMsg(box, 'sys', m.v);
    });
  }
  sc();
}

function addMsg(box, cls, text) {
  const d = document.createElement('div');
  d.className = 'msg ' + cls;
  d.textContent = text;
  box.appendChild(d);
  return d;
}
function addSOS(box, text) {
  const d = document.createElement('div');
  d.className = 'msg sos';
  d.innerHTML = '<div class="sos-lbl">🆘 중재 코치 힌트</div><div>' + esc(text) + '</div>';
  box.appendChild(d);
  return d;
}
function sc() { const b = document.getElementById('msgs'); if (b) b.scrollTop = b.scrollHeight; }
function hkey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }

async function send() {
  const p = getP();
  if (!p || p.agreed || !topic) return;
  const inp = document.getElementById('chatInput');
  const txt = inp.value.trim();
  if (!txt) return;
  const btn = document.getElementById('sendBtn');
  inp.value = ''; inp.disabled = true; btn.disabled = true;

  const g = gl();
  const box = document.getElementById('msgs');
  const isSOS = /\[SOS\]|\[sos\]|\[도움\s*요청\]/i.test(txt);

  if (!isSOS) p.msgs.push({ t: 'u', v: txt });
  addMsg(box, 'user', txt);
  sc();

  if (isSOS) {
    if (p.sos >= p.SOS_MAX) {
      const msg = '도움 요청 횟수를 모두 사용했습니다. 지금까지 배운 것으로 도전해 보세요!';
      p.msgs.push({ t: 's', v: msg }); addSOS(box, msg);
    } else {
      p.sos++;
      const tmp = document.createElement('div');
      tmp.className = 'msg sos';
      tmp.innerHTML = '<div class="sos-lbl">🆘 중재 코치 힌트</div><div>분석 중...</div>';
      box.appendChild(tmp); sc();
      try {
        const r = await callAI(p.sosPrompt(g, hist(p)));
        tmp.remove(); p.msgs.push({ t: 's', v: r }); addSOS(box, r);
      } catch(e) {
        tmp.remove();
        const em = '힌트 오류: ' + e.message;
        p.msgs.push({ t: 's', v: em }); addSOS(box, em);
      }
      const st = document.querySelector('.sos-tag');
      if (st) st.textContent = '🆘 ' + (p.SOS_MAX - p.sos) + '회 남음';
      const sh = document.querySelector('.sos-h');
      if (sh) sh.innerHTML = '<code>[도움 요청]</code> 또는 <code>[SOS]</code> 입력 → 중재 코치 힌트 (' + (p.SOS_MAX - p.sos) + '회 남음)';
    }
    sc(); inp.disabled = false; btn.disabled = false; inp.focus();
    return;
  }

  const tmp = document.createElement('div');
  tmp.className = 'typing'; tmp.textContent = '···';
  box.appendChild(tmp); sc();

  try {
    const r = await callAI(p.prompt(g, hist(p)));
    tmp.remove();
    const agreed = r.includes('당신의 합리적 태도와 대화 규칙 덕분에') && r.includes('동의할 수밖에 없군요');
    p.n++;
    p.msgs.push({ t: 'b', v: r, agreed });
    addMsg(box, 'bot' + (agreed ? ' agreed' : ''), r);
    if (agreed && !p.agreed) {
      p.agreed = true;
      p.msgs.push({ t: 'sys', v: '✅ ' + p.name + '을(를) 설득했습니다!' });
      addMsg(box, 'sys', '✅ ' + p.name + '을(를) 설득했습니다!');
      updateProg();
    }
    renderGrid();
  } catch(e) {
    tmp.remove();
    const em = '오류: ' + e.message;
    p.msgs.push({ t: 'b', v: em });
    addMsg(box, 'bot', em);
  }

  sc();
  inp.disabled = p.agreed; btn.disabled = p.agreed;
  if (!p.agreed) inp.focus();
}

renderGrid();
updateProg();
</script>
</body>
</html>
